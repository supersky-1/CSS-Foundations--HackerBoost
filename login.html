<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="page">
        <form class="card">
          <div class="card-content">
                <div class="upper-card"></div>
                <div class="name">
                    <label for="name"><img src="Icons/user-round.svg" alt="icon" width="20px" height="20px"> User name / Email</label><br>
                    <input type="email" name="email" id="email" required><br>
                </div>
                <div class="password">
                    <label for="password"><img src="Icons/lock.svg" alt="icon" width="20px" height="20px"> Password</label><br>
                    <input type="password" name="password" id="password" required>
                </div>
                <div class="remember-me">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit">LOGIN NOW <img src="Icons/greater-than.svg" alt="icon" width="20px" height="20px"></button>
            </div>
            <div class="lower-card"></div>
            <div class="options">
                <h4>log in via</h4> 
                <div class="logos">
                    <a href="https://www.instagram.com" target="_blank"><img src="Icons/instagram.png" alt="logo" width="20px" height="20px"></a>
                    <a href="https://www.facebook.com" target="_blank"><img src="Icons/facebook.png" alt="logo" width="20px" height="20px"></a>
                    <a href="https://www.twitter.com" target="_blank"><img src="Icons/twitter.png" alt="logo" width="20px" height="20px"></a>
                </div>
            </div>
        </form> 
            
    </div>
</body>
</html>
